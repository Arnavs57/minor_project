# Configuration for Underwater Marine Waste Detection Project
# Modify these paths and hyperparameters as needed for your setup

# Dataset paths (placeholder - update with actual dataset location)
dataset:
  raw_path: "dataset/raw"
  processed_path: "dataset/processed"
  annotations_path: "dataset/annotations"
  splits_path: "dataset/splits"
  
  # Public marine waste datasets to consider:
  # - TrashCan: https://github.com/WasabiPhong/TrashCan
  # - OpenLitterMap
  # - Marine Debris Dataset (Kaggle)

# Preprocessing parameters
preprocessing:
  # CLAHE (Contrast Limited Adaptive Histogram Equalization)
  clahe:
    enabled: true
    clip_limit: 2.0      # Contrast limiting factor (higher = more contrast)
    tile_grid_size: [8, 8]  # Grid size for local histogram equalization
  
  # Color correction - white balance adjustment
  color_correction:
    enabled: true
    method: "gray_world"  # Options: gray_world, retinex, histogram_matching
  
  # Dehazing (Dark Channel Prior)
  dehazing:
    enabled: true
    omega: 0.95          # Amount of haze to remove (0.9-1.0)
    t0: 0.1              # Minimum transmission threshold

# Model training (YOLOv8)
training:
  model: "yolov8n.pt"    # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  epochs: 100
  batch_size: 16
  img_size: 640
  patience: 20           # Early stopping patience
  
  # Marine waste classes (COCO-style, customize based on your dataset)
  classes:
    - plastic_bottle
    - plastic_bag
    - fishing_net
    - can
    - other_waste

# Inference
inference:
  confidence_threshold: 0.5
  iou_threshold: 0.45
